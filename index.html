<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Cards Training</title>
    </head>
    <body>
        <h1 class="title">Выбери свой продукт</h1>
        <ul class="items">
            <li class="items_item">
                <img
                    class="items_image"
                    src="/img/moisturizing_mousse_1.jpg"
                    alt="Увлажняющий мусс"
                />
                <p class="items_type">для нормальной кожи</p>
                <h2 class="items_subtitle">Увлажняющий мусс</h2>
                <p class="items_decs text_main">
                    Глубоко увлажняют кожу лица, оставляя её мягкой и гладкой.
                </p>
                <span class="items_list-title text_main">Состав:</span>
                <ul class="items_list">
                    <li class="items_list-item text_main">активные натуральные комплексы</li>
                    <li class="items_list-item text_main">витамины С, А, РР, В И Е</li>
                    <li class="items_list-item text_main">солнцезащитные компоненты</li>
                </ul>
                <b class="items_price">Цена</b>
                <p class="items_price">2 750 <span>&#8381;</span></p>
            </li>
        </ul>
    </body>
</html>
